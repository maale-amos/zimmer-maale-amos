<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 90" width="500" height="90">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4b87a"/>
      <stop offset="50%" stop-color="#b8923f"/>
      <stop offset="100%" stop-color="#6b521b"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#sg)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center medallion arc -->
    <path d="M 220 70 Q 250 25 280 70" stroke-width="1.8"/>
    <path d="M 230 70 Q 250 35 270 70" stroke-width="0.8" opacity="0.7"/>
    <!-- Center dot/jewel -->
    <circle cx="250" cy="50" r="3" fill="#6b521b" stroke-width="0"/>
    <circle cx="250" cy="50" r="1.5" fill="#d4b87a" stroke-width="0"/>

    <!-- Left wing scrollwork -->
    <path d="M 220 70 Q 190 60 160 65 Q 130 70 100 60 Q 75 50 50 60"/>
    <path d="M 220 70 Q 190 75 160 72 Q 130 68 100 75 Q 75 80 50 72" stroke-width="0.8" opacity="0.6"/>
    <!-- Left scroll spiral -->
    <path d="M 50 60 Q 35 55 32 65 Q 35 75 48 73 Q 52 68 48 64"/>
    <!-- Left leaves -->
    <path d="M 130 65 Q 145 55 155 65 Q 150 72 138 70 Q 130 68 130 65 Z" fill="#b8923f" fill-opacity="0.25"/>
    <path d="M 80 60 Q 95 52 105 60 Q 100 67 90 65 Q 82 63 80 60 Z" fill="#b8923f" fill-opacity="0.25"/>

    <!-- Right wing scrollwork -->
    <path d="M 280 70 Q 310 60 340 65 Q 370 70 400 60 Q 425 50 450 60"/>
    <path d="M 280 70 Q 310 75 340 72 Q 370 68 400 75 Q 425 80 450 72" stroke-width="0.8" opacity="0.6"/>
    <!-- Right scroll spiral -->
    <path d="M 450 60 Q 465 55 468 65 Q 465 75 452 73 Q 448 68 452 64"/>
    <!-- Right leaves -->
    <path d="M 370 65 Q 355 55 345 65 Q 350 72 362 70 Q 370 68 370 65 Z" fill="#b8923f" fill-opacity="0.25"/>
    <path d="M 420 60 Q 405 52 395 60 Q 400 67 410 65 Q 418 63 420 60 Z" fill="#b8923f" fill-opacity="0.25"/>

    <!-- Decorative dots along the wave -->
    <circle cx="115" cy="65" r="1" fill="#b8923f" stroke-width="0"/>
    <circle cx="170" cy="68" r="1" fill="#b8923f" stroke-width="0"/>
    <circle cx="200" cy="70" r="1" fill="#b8923f" stroke-width="0"/>
    <circle cx="300" cy="70" r="1" fill="#b8923f" stroke-width="0"/>
    <circle cx="330" cy="68" r="1" fill="#b8923f" stroke-width="0"/>
    <circle cx="385" cy="65" r="1" fill="#b8923f" stroke-width="0"/>
  </g>
</svg>
