<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60" width="600" height="60">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4b87a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#b8923f"/>
      <stop offset="50%" stop-color="#6b521b"/>
      <stop offset="80%" stop-color="#b8923f"/>
      <stop offset="100%" stop-color="#d4b87a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#dg)" stroke-width="1.2" stroke-linecap="round">
    <!-- Main horizontal line -->
    <line x1="20" y1="30" x2="240" y2="30" stroke-width="0.8"/>
    <line x1="360" y1="30" x2="580" y2="30" stroke-width="0.8"/>

    <!-- Left scroll left -->
    <path d="M 240 30 Q 250 30 255 25 Q 260 20 268 22 Q 272 26 270 30 Q 268 34 264 32"/>
    <path d="M 245 30 Q 245 24 252 22" stroke-width="0.5" opacity="0.7"/>

    <!-- Right scroll left -->
    <path d="M 360 30 Q 350 30 345 25 Q 340 20 332 22 Q 328 26 330 30 Q 332 34 336 32"/>
    <path d="M 355 30 Q 355 24 348 22" stroke-width="0.5" opacity="0.7"/>

    <!-- Center diamond/lozenge -->
    <path d="M 300 16 L 312 30 L 300 44 L 288 30 Z" stroke-width="1.2"/>
    <path d="M 300 22 L 306 30 L 300 38 L 294 30 Z" stroke-width="0.6" fill="#b8923f" fill-opacity="0.4"/>
    <circle cx="300" cy="30" r="2" fill="#6b521b" stroke="none"/>

    <!-- Small ornaments around center -->
    <circle cx="278" cy="30" r="1.5" fill="#b8923f" stroke="none"/>
    <circle cx="322" cy="30" r="1.5" fill="#b8923f" stroke="none"/>

    <!-- End flourishes left -->
    <path d="M 30 30 Q 22 30 18 26 Q 15 22 18 18 Q 22 15 26 18 Q 28 22 26 26"/>
    <circle cx="22" cy="22" r="1" fill="#6b521b" stroke="none"/>

    <!-- End flourishes right -->
    <path d="M 570 30 Q 578 30 582 26 Q 585 22 582 18 Q 578 15 574 18 Q 572 22 574 26"/>
    <circle cx="578" cy="22" r="1" fill="#6b521b" stroke="none"/>

    <!-- Tiny decorative dots along the line -->
    <circle cx="100" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
    <circle cx="160" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
    <circle cx="200" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
    <circle cx="400" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
    <circle cx="440" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
    <circle cx="500" cy="30" r="0.8" fill="#b8923f" stroke="none"/>
  </g>
</svg>
